name: Daily News Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 書き込み権限を与える設定
    permissions:
      contents: write
      
    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v3

      - name: Pythonを準備
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: ライブラリをインストール
        run: pip install -r requirements.txt

      - name: Python実行（ファイル作成）
        run: python news_bot.py

      - name: 変更をリポジトリに保存
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add daily_report.txt
          git commit -m "Add daily news report" || echo "No changes to commit"
          git push

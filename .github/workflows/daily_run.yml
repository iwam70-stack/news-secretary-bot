name: Daily News Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 書き込み権限を与える設定
    permissions:
      contents: write
      
    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v3

      - name: Pythonを準備
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Python実行（トレンド取得）
        run: python trend_bot.py  # ここを書き換えるだけ！
          
      - name: Python実行（ファイル作成）
        env:  # ← これを追加！
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # ← これも追加！
        run: python news_bot.py
     
      - name: 重要ニュースがあればメール送信
        if: success() # 前のステップが成功した時だけ実行
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🔥 本日の重要ニュースレポート"
          body: file://mail_body.txt
          to: iwam70@gmail.com
          from: GitHub News Secretary
      
      - name: 変更をリポジトリに保存
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add daily_report.txt
          git commit -m "Add daily news report" || echo "No changes to commit"
          git push

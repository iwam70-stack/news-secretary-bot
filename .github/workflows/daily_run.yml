name: Daily News Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 書き込み権限を与える設定
    permissions:
      contents: write
      
    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4  # v3 から v4 へ

      - name: Pythonを準備
        uses: actions/setup-python@v5  # v4 から v5 へ
        with:
          python-version: '3.11'

      - name: ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          # google-generativeai を追加します
          pip install requests beautifulsoup4 google-generativeai
      - name: Python実行（トレンド取得）
        env:  # ← これ！これが「給料（APIキー）」を渡す指示です
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  
        run: python trend_bot.py
        
      - name: 重要ニュースがあればメール送信
        if: success() # 前のステップが成功した時だけ実行
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🔥 本日の重要ニュースレポート"
          body: file://mail_body.txt
          to: iwam70@gmail.com
          from: GitHub News Secretary
      
      - name: 変更をリポジトリに保存
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add daily_report.txt
          git commit -m "Add daily news report" || echo "No changes to commit"
          git push
